<h2>Veterinarians</h2>

<div class="form-group mb-3">
    <input type="text" class="form-control" placeholder="Search veterinarians..." ng-model="$ctrl.searchQuery" />
</div>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Name</th>
        <th>Specialties</th>
    </tr>
    </thead>

    <tr ng-repeat="vet in $ctrl.vetList | filter:$ctrl.searchQuery">
        <td>{{vet.firstName}} {{vet.lastName}}</td>
        <td><span ng-repeat="specialty in vet.specialties">{{specialty.name + ' '}}</span></td>

    </tr>
</table>
